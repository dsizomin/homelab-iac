services:
  caddy:
    image: ${IMAGE}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    networks:
      - proxy_network
      # - public_network
    secrets:
      - acme_cloudflare_api_key

networks:
  proxy_network:
    name: proxy_network
    external: true
  # public_network:
  #   name: public_network
  #   external: true

secrets:
  acme_cloudflare_api_key:
    external: true

volumes:
  caddy-data:
  caddy-config:
  caddy-logs:
