services:
  miniserve:
    image: svenstaro/miniserve:latest
    ports:
      - "8085:8085"
    volumes:
      - /srv/data/miniserve:/data
    command: >
      /data --mkdir --rm-files --upload-files --interfaces 0.0.0.0 --port 8085
    networks:
      - proxy_network

networks:
  proxy_network:
    name: proxy_network
    external: true
