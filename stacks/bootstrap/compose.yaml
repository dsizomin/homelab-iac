services:
  komodo-postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:16
    container_name: komodo-postgres
    labels:
      komodo.skip: # Prevent Komodo from stopping with StopAllContainers
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - komodo
    secrets:
      - komodo-db-username
      - komodo-db-password
    environment:
      POSTGRES_USER_FILE: /run/secrets/komodo-db-username
      POSTGRES_PASSWORD_FILE: /run/secrets/komodo-db-password
      POSTGRES_DB: postgres

  komodo-ferret:
    image: ghcr.io/ferretdb/ferretdb:2.5.0
    container_name: komodo-ferret
    labels:
      komodo.skip: # Prevent Komodo from stopping with StopAllContainers
    restart: unless-stopped
    depends_on:
      - komodo-postgres
    volumes:
      - ferret-state:/state
    networks:
      - komodo
    secrets:
      - komodo-db-conn-string
    environment:
      FERRETDB_POSTGRESQL_URL_FILE: /run/secrets/komodo-db-conn-string

  komodo-core:
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo
    labels:
      komodo.skip: # Prevent Komodo from stopping with StopAllContainers
    restart: unless-stopped
    depends_on:
      - komodo-ferret
    ports:
      - 9120:9120
    env_file: ./.env
    secrets:
      - komodo-db-username
      - komodo-db-password
      - komodo-init-username
      - komodo-init-password
      - komodo-passkey
      - komodo-jwt-secret
      - komodo-webhook-secret
    environment:
      KOMODO_DATABASE_ADDRESS: komodo-ferret:27017
      KOMODO_DATABASE_USERNAME_FILE: /run/secrets/komodo-db-username
      KOMODO_DATABASE_PASSWORD_FILE: /run/secrets/komodo-db-password
      KOMODO_INIT_ADMIN_USERNAME_FILE: /run/secrets/komodo-init-username
      KOMODO_INIT_ADMIN_PASSWORD_FILE: /run/secrets/komodo-init-password
      KOMODO_PASSKEY_FILE: /run/secrets/komodo-passkey
      KOMODO_JWT_SECRET_FILE: /run/secrets/komodo-jwt-secret
      KOMODO_WEBHOOK_SECRET_FILE: /run/secrets/komodo-webhook-secret

    networks:
      - komodo
      - proxy
    volumes:
      ## Store dated backups of the database - https://komo.do/docs/setup/backup
      - /srv/data/_prebackup_dumps/komodo:/backups
      ## Store sync files on server
      - /srv/data/komodo/syncs:/syncs
  ## Optionally mount a custom core.config.toml
  # - /path/to/core.config.toml:/config/config.toml
  ## Allows for systemd Periphery connection at
  ## "https://host.docker.internal:8120"
  # extra_hosts:
  #   - host.docker.internal:host-gateway

  ## Deploy Periphery container using this block,
  ## or deploy the Periphery binary with systemd using
  ## https://github.com/moghtech/komodo/tree/main/scripts
  komodo-periphery:
    image: ghcr.io/moghtech/komodo-periphery:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo-periphery
    labels:
      komodo.skip: # Prevent Komodo from stopping with StopAllContainers
    restart: unless-stopped
    env_file: ./.env
    networks:
      - komodo
    volumes:
      - /srv/compose:/stacks
      ## Mount external docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      ## Allow Periphery to see processes outside of container
      - /proc:/proc
      ## Specify the Periphery agent root directory.
      ## Must be the same inside and outside the container,
      ## or docker will get confused. See https://github.com/moghtech/komodo/discussions/180.
      ## Default: /etc/komodo.
      - ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}:${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}

networks:
  proxy:
    name: caddy-proxy
  komodo:

volumes:
  ferret-state:
  postgres-data:

secrets:
  komodo-db-username:
    environment: KOMODO_DB_USERNAME
  komodo-db-password:
    environment: KOMODO_DB_PASSWORD
  komodo-db-conn-string:
    environment: KOMODO_DB_CONNECTION_STRING
  komodo-passkey:
    environment: KOMODO_PASSKEY
  komodo-webhook-secret:
    environment: KOMODO_WEBHOOK_SECRET
  komodo-jwt-secret:
    environment: KOMODO_JWT_SECRET
  komodo-init-username:
    environment: KOMODO_INIT_ADMIN_USERNAME
  komodo-init-password:
    environment: KOMODO_INIT_ADMIN_PASSWORD
